name: Publish
on:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to PSGallery
        id: publish
        shell: pwsh
        run: |
          if (-not $env:PSGALLERY_KEY) { throw "PSGALLERY_API_KEY secret is not set." }
          $manifest = Test-ModuleManifest -Path ./EntraVacuum/EntraVacuum.psd1
          $version = $manifest.Version.ToString()
          $existing = Find-Module -Name EntraVacuum -RequiredVersion $version -ErrorAction SilentlyContinue
          if ($existing) {
            Write-Host "Version $version already published - skipping."
            echo "version=$version" >> $env:GITHUB_OUTPUT
            echo "skipped=true" >> $env:GITHUB_OUTPUT
            exit 0
          }
          Publish-Module -Path ./EntraVacuum -NuGetApiKey $env:PSGALLERY_KEY
          Write-Host "Published version $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "skipped=false" >> $env:GITHUB_OUTPUT
        env:
          PSGALLERY_KEY: ${{ secrets.PSGALLERY_API_KEY }}
      - name: Create GitHub Release
        if: steps.publish.outputs.skipped == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.publish.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p }" CHANGELOG.md | sed '/^$/d')"
